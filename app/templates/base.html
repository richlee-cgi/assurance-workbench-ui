<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} - Assurance Workbench</title>
    <link rel="icon" href="{{ url_for('static', path='/icons/favicon.svg') }}" type="image/svg+xml">
    <link rel="manifest" href="{{ url_for('static', path='/manifest.webmanifest') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
    <script src="{{ url_for('static', path='/vendor/htmx.min.js') }}" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-brand">
        <img src="{{ url_for('static', path='/icons/app-icon.svg') }}" width="32" height="32" alt="" aria-hidden="true">
        <h1>Assurance Workbench</h1>
      </div>
      <nav aria-label="Primary">
        <a href="/" class="{{ 'active' if active_nav == 'home' else '' }}">Run</a>
        <a href="/runs" class="{{ 'active' if active_nav == 'runs' else '' }}">Results</a>
        <a href="/settings" class="{{ 'active' if active_nav == 'settings' else '' }}">Settings</a>
        <a href="/guide" class="{{ 'active' if active_nav == 'guide' else '' }}">Guide</a>
      </nav>
    </header>

    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
