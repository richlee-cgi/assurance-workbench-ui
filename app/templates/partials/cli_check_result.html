<div class="inline-result {{ 'success' if result.ok else 'error' }}">
  <button class="dismiss-button" type="button" aria-label="Dismiss message" onclick="this.closest('.inline-result').remove()">×</button>
  <strong>{{ result.message }}</strong>
  <div class="command-line">{{ " ".join(result.command) }}</div>
  {% if result.stdout %}
    <details>
      <summary>Output</summary>
      <pre>{{ result.stdout }}</pre>
    </details>
  {% endif %}
  {% if result.stderr %}
    <details>
      <summary>Error output</summary>
      <pre>{{ result.stderr }}</pre>
    </details>
  {% endif %}
</div>
