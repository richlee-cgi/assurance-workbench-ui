{% extends "base.html" %}

{% block content %}
<section class="panel">
  <div class="section-header">
    <div>
      <p class="eyebrow">Local only</p>
      <h2>Settings</h2>
    </div>
    <span class="status-pill">Local file</span>
  </div>

  <form id="settings-form" class="grid-form" hx-post="/settings" hx-target="#settings-status" hx-swap="innerHTML">
    <label>
      Assurance executable
      <input type="text" name="assurance_path" value="{{ settings.assurance_path }}" placeholder="/path/to/assurance-cli/.venv/bin/assurance">
    </label>

    <label>
      Workbench evidence root
      <input type="text" name="workbench_root" value="{{ settings.workbench_root }}" placeholder="/path/to/Workbench/30 Workbenches/.../02-Evidence">
    </label>

    <label>
      Default Confluence space
      <input type="text" name="confluence_space" value="{{ settings.confluence_space }}" placeholder="SPACE">
    </label>

    <label>
      Default Jira project
      <input type="text" name="jira_project" value="{{ settings.jira_project }}" placeholder="PROJ">
    </label>

    <label>
      Default Azure resource group
      <input type="text" name="azure_resource_group" value="{{ settings.azure_resource_group }}" placeholder="rg-example-dev">
    </label>

    <label>
      Default repo roots
      <textarea name="repo_roots" placeholder="/Users/example/dev">{{ settings.repo_roots }}</textarea>
    </label>

    <label>
      Default repos
      <textarea name="repos" placeholder="service-a&#10;service-b">{{ settings.repos }}</textarea>
    </label>

    <div class="form-actions">
      <button type="submit">Save settings</button>
      <button type="button" hx-post="/settings/check-assurance" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML">
        Check assurance CLI
      </button>
      <button type="button" hx-post="/settings/check-azure" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML">
        Check Azure
      </button>
      <button type="button" hx-post="/settings/check-dataverse" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML">
        Check Dataverse
      </button>
    </div>
  </form>

  <div id="settings-status" class="fragment-slot" aria-live="polite"></div>
  <div id="cli-check-result" class="fragment-slot" aria-live="polite"></div>

  <div class="notice">
    Settings are stored in a local ignored file. Do not store credentials in this UI.
  </div>
</section>
{% endblock %}
