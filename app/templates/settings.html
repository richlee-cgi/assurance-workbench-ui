{% extends "base.html" %}

{% block content %}
<section class="panel">
  <div class="section-header">
    <div>
      <h2>Settings</h2>
    </div>
    <span class="status-pill">Local file</span>
  </div>

  <form id="settings-form" class="grid-form" hx-post="/settings" hx-target="#settings-status" hx-swap="innerHTML">
    <label>
      Assurance executable override
      <input type="text" name="assurance_path" value="{{ settings.assurance_path }}" placeholder="Optional: /path/to/assurance or C:\path\to\assurance.exe">
    </label>

    <label>
      Workbench evidence root
      <input type="text" name="workbench_root" value="{{ settings.workbench_root }}" placeholder="/path/to/Workbench/30 Workbenches/.../02-Evidence">
    </label>

    <label>
      Default Confluence space
      <input type="text" name="confluence_space" value="{{ settings.confluence_space }}" placeholder="SPACE">
    </label>

    <label>
      Default Jira project
      <input type="text" name="jira_project" value="{{ settings.jira_project }}" placeholder="PROJ">
    </label>

    <label>
      Default Azure resource group
      <input type="text" name="azure_resource_group" value="{{ settings.azure_resource_group }}" placeholder="rg-example-dev">
    </label>

    <label>
      Default repo roots
      <textarea name="repo_roots" placeholder="/Users/example/dev">{{ settings.repo_roots }}</textarea>
    </label>

    <label>
      Default repos
      <textarea name="repos" placeholder="service-a&#10;service-b">{{ settings.repos }}</textarea>
    </label>

    <label>
      Exclude Confluence from parent
      <textarea name="exclude_confluence_parents" placeholder="983238177&#10;https://example.atlassian.net/wiki/spaces/SPACE/pages/983238177/Assurance">{{ settings.exclude_confluence_parents }}</textarea>
    </label>

    <label>
      Jira team field
      <input type="text" name="jira_team_field" value="{{ settings.jira_team_field }}" placeholder="Team or customfield_12345">
    </label>

    <label>
      Exclude Jira from Team
      <textarea name="exclude_jira_teams" placeholder="DSP Assurance">{{ settings.exclude_jira_teams }}</textarea>
    </label>

    <div class="form-actions">
      <button type="submit">Save settings</button>
      <button data-cli-check-button type="button" hx-post="/settings/check-assurance" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML" hx-indicator="#cli-check-spinner">
        Check assurance CLI
      </button>
      <button data-cli-check-button type="button" hx-post="/settings/check-azure" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML" hx-indicator="#cli-check-spinner">
        Check Azure
      </button>
      <button data-cli-check-button type="button" hx-post="/settings/check-dataverse" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML" hx-indicator="#cli-check-spinner">
        Check Dataverse
      </button>
      <span id="cli-check-spinner" class="spinner htmx-indicator" aria-label="Check running"></span>
    </div>
  </form>

  <div id="settings-status" class="fragment-slot" aria-live="polite"></div>
  <div id="cli-check-result" class="fragment-slot" aria-live="polite"></div>

  <div class="notice">
    Settings are stored in <code>{{ settings_path }}</code>, which is ignored by Git. Leave the assurance executable blank to use the bundled CLI dependency. Do not store credentials in this UI.
  </div>
</section>
<script>
  document.body.addEventListener("htmx:beforeRequest", function (event) {
    if (!event.detail.elt.matches("[data-cli-check-button]")) {
      return;
    }
    document.querySelectorAll("[data-cli-check-button]").forEach(function (button) {
      button.disabled = true;
    });
  });

  document.body.addEventListener("htmx:afterRequest", function (event) {
    if (!event.detail.elt.matches("[data-cli-check-button]")) {
      return;
    }
    document.querySelectorAll("[data-cli-check-button]").forEach(function (button) {
      button.disabled = false;
    });
  });
</script>
{% endblock %}
