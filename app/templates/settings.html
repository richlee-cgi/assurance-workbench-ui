{% extends "base.html" %}

{% block content %}
<section class="panel">
  <div class="section-header">
    <div>
      <h2>Settings</h2>
    </div>
    <span class="status-pill">Local file</span>
  </div>

  <form id="settings-form" class="grid-form" hx-post="/settings" hx-target="#settings-status" hx-swap="innerHTML">
    <label>
      <span class="field-title">Assurance CLI path override <span class="info-tooltip" tabindex="0" aria-label="Only set this when developing or testing a separate assurance-cli checkout.">i<span class="tooltip-content" role="tooltip">Only set this when developing or testing a separate assurance-cli checkout.</span></span></span>
      <input type="text" name="assurance_path" value="{{ settings.assurance_path }}" placeholder="Optional: leave blank to use bundled CLI">
    </label>

    <label>
      <span class="field-title">Assurance env file <span class="info-tooltip" tabindex="0" aria-label="Optional path to a .env file passed to assurance-cli subprocesses. Useful when credentials live in a separate CLI checkout.">i<span class="tooltip-content" role="tooltip">Optional path to a .env file passed to assurance-cli subprocesses. Useful when credentials live in a separate CLI checkout.</span></span></span>
      <input type="text" name="assurance_env_file" value="{{ settings.assurance_env_file }}" placeholder="/path/to/assurance-cli/.env">
    </label>

    <label>
      <span class="field-title">Workbench evidence root <span class="info-tooltip" tabindex="0" aria-label="Folder where timestamped evidence run folders will be saved.">i<span class="tooltip-content" role="tooltip">Folder where timestamped evidence run folders will be saved.</span></span></span>
      <input type="text" name="workbench_root" value="{{ settings.workbench_root }}" placeholder="/path/to/Workbench/30 Workbenches/.../02-Evidence">
    </label>

    <label>
      <span class="field-title">Default Confluence space <span class="info-tooltip" tabindex="0" aria-label="Optional default space key used when Confluence is selected.">i<span class="tooltip-content" role="tooltip">Optional default space key used when Confluence is selected.</span></span></span>
      <input type="text" name="confluence_space" value="{{ settings.confluence_space }}" placeholder="SPACE">
    </label>

    <label>
      <span class="field-title">Default Jira project <span class="info-tooltip" tabindex="0" aria-label="Optional default Jira project key used when Jira is selected.">i<span class="tooltip-content" role="tooltip">Optional default Jira project key used when Jira is selected.</span></span></span>
      <input type="text" name="jira_project" value="{{ settings.jira_project }}" placeholder="PROJ">
    </label>

    <label>
      <span class="field-title">Default Azure resource group <span class="info-tooltip" tabindex="0" aria-label="Optional default Azure resource group used to keep Azure searches focused.">i<span class="tooltip-content" role="tooltip">Optional default Azure resource group used to keep Azure searches focused.</span></span></span>
      <input type="text" name="azure_resource_group" value="{{ settings.azure_resource_group }}" placeholder="rg-example-dev">
    </label>

    <label>
      <span class="field-title">Default repo roots <span class="info-tooltip" tabindex="0" aria-label="One or more local folders that contain checked-out Git repositories.">i<span class="tooltip-content" role="tooltip">One or more local folders that contain checked-out Git repositories.</span></span></span>
      <textarea name="repo_roots" placeholder="/Users/example/dev">{{ settings.repo_roots }}</textarea>
    </label>

    <label>
      <span class="field-title">Default repos <span class="info-tooltip" tabindex="0" aria-label="Optional newline-separated repository names or paths to include by default.">i<span class="tooltip-content" role="tooltip">Optional newline-separated repository names or paths to include by default.</span></span></span>
      <textarea name="repos" placeholder="service-a&#10;service-b">{{ settings.repos }}</textarea>
    </label>

    <label>
      <span class="field-title">Exclude Confluence from parent <span class="info-tooltip" tabindex="0" aria-label="Exclude pages under these Confluence parent page IDs or URLs.">i<span class="tooltip-content" role="tooltip">Exclude pages under these Confluence parent page IDs or URLs.</span></span></span>
      <textarea name="exclude_confluence_parents" placeholder="983238177&#10;https://example.atlassian.net/wiki/spaces/SPACE/pages/983238177/Assurance">{{ settings.exclude_confluence_parents }}</textarea>
    </label>

    <input type="hidden" name="jira_team_field" value="{{ settings.jira_team_field }}">

    <label>
      <span class="field-title">Excluded Jira teams <span class="info-tooltip" tabindex="0" aria-label="Exact Jira team names to remove from evidence results. Uses the default Jira Team field.">i<span class="tooltip-content" role="tooltip">Exact Jira team names to remove from evidence results. Uses the default Jira Team field.</span></span></span>
      <textarea name="exclude_jira_teams" placeholder="DSP Assurance">{{ settings.exclude_jira_teams }}</textarea>
    </label>

    <div class="form-actions">
      <button type="submit">Save settings</button>
      <button data-cli-check-button type="button" hx-post="/settings/check-assurance" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML" hx-indicator="#cli-check-spinner">
        Check assurance CLI
      </button>
      <button data-cli-check-button type="button" hx-post="/settings/check-azure" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML" hx-indicator="#cli-check-spinner">
        Check Azure
      </button>
      <button data-cli-check-button type="button" hx-post="/settings/check-dataverse" hx-include="#settings-form" hx-target="#cli-check-result" hx-swap="innerHTML" hx-indicator="#cli-check-spinner">
        Check Dataverse
      </button>
      <span id="cli-check-spinner" class="spinner htmx-indicator" aria-label="Check running"></span>
    </div>
  </form>

  <div id="settings-status" class="fragment-slot" aria-live="polite"></div>
  <div id="cli-check-result" class="fragment-slot" aria-live="polite"></div>

  <div class="notice">
    Settings are stored in <code>{{ settings_path }}</code>, which is ignored by Git. Do not paste credentials into this UI; store only the path to a local env file.
  </div>
</section>
<script>
  document.body.addEventListener("htmx:beforeRequest", function (event) {
    if (!event.detail.elt.matches("[data-cli-check-button]")) {
      return;
    }
    document.querySelectorAll("[data-cli-check-button]").forEach(function (button) {
      button.disabled = true;
    });
  });

  document.body.addEventListener("htmx:afterRequest", function (event) {
    if (!event.detail.elt.matches("[data-cli-check-button]")) {
      return;
    }
    document.querySelectorAll("[data-cli-check-button]").forEach(function (button) {
      button.disabled = false;
    });
  });
</script>
{% endblock %}
