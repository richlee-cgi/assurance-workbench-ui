{% extends "base.html" %}

{% block content %}
<section class="panel">
  <div class="section-header">
    <div>
      <h2>Evidence pack runner</h2>
    </div>
  </div>

  <form id="evidence-form" class="grid-form" hx-post="/preview-command" hx-target="#command-preview" hx-swap="innerHTML" hx-trigger="change, keyup delay:300ms from:input">
    <input type="hidden" name="sources_present" value="1">
    <input type="hidden" name="exclude_confluence_parents" value="{{ settings.exclude_confluence_parents }}">
    <input type="hidden" name="jira_team_field" value="{{ settings.jira_team_field }}">
    <input type="hidden" name="exclude_jira_teams" value="{{ settings.exclude_jira_teams }}">

    <label>
      <span class="field-title">Topic <span class="info-tooltip" tabindex="0" aria-label="Main search text. The words are passed together as one topic phrase; each source applies its own matching, including plural handling where supported.">i<span class="tooltip-content" role="tooltip">Main search text. The words are passed together as one topic phrase; each source applies its own matching, including plural handling where supported.</span></span></span>
      <input type="text" name="topic" placeholder="booking allocation">
    </label>

    <label>
      <span class="field-title">Additional queries <span class="info-tooltip" tabindex="0" aria-label="Optional extra search terms, one per line. The Workbench asks each selected source for each term, then merges and deduplicates the evidence.">i<span class="tooltip-content" role="tooltip">Optional extra search terms, one per line. The Workbench asks each selected source for each term, then merges and deduplicates the evidence.</span></span></span>
      <textarea name="queries" placeholder="ADLI&#10;ADR ADLI&#10;OP008"></textarea>
    </label>

    <label>
      <span class="field-title">Preset <span class="info-tooltip" tabindex="0" aria-label="Optional assurance lens that adjusts the default topic shape and included evidence sources.">i<span class="tooltip-content" role="tooltip">Optional assurance lens that adjusts the default topic shape and included evidence sources.</span></span></span>
      <select name="preset">
        <option value="">None</option>
        <option value="architecture">Architecture</option>
        <option value="delivery">Delivery</option>
        <option value="operations">Operations</option>
        <option value="dataverse">Dataverse</option>
        <option value="performance">Performance</option>
        <option value="risk">Risk</option>
      </select>
    </label>

    <label>
      <span class="field-title">Confluence space <span class="info-tooltip" tabindex="0" aria-label="Optional Confluence space key used to keep Confluence searches focused.">i<span class="tooltip-content" role="tooltip">Optional Confluence space key used to keep Confluence searches focused.</span></span></span>
      <input type="text" name="confluence_space" value="{{ settings.confluence_space }}" placeholder="SPACE">
    </label>

    <label>
      <span class="field-title">Jira project <span class="info-tooltip" tabindex="0" aria-label="Optional Jira project key used to keep Jira searches focused.">i<span class="tooltip-content" role="tooltip">Optional Jira project key used to keep Jira searches focused.</span></span></span>
      <input type="text" name="jira_project" value="{{ settings.jira_project }}" placeholder="PROJ">
    </label>

    <label>
      <span class="field-title">Azure resource group <span class="info-tooltip" tabindex="0" aria-label="Optional Azure resource group used to keep Azure searches focused.">i<span class="tooltip-content" role="tooltip">Optional Azure resource group used to keep Azure searches focused.</span></span></span>
      <input type="text" name="azure_resource_group" value="{{ settings.azure_resource_group }}" placeholder="rg-example-dev">
    </label>

    <label>
      <span class="field-title">Repo roots <span class="info-tooltip" tabindex="0" aria-label="One or more local folders that contain checked-out Git repositories.">i<span class="tooltip-content" role="tooltip">One or more local folders that contain checked-out Git repositories.</span></span></span>
      <textarea name="repo_roots" placeholder="/Users/example/dev">{{ settings.repo_roots }}</textarea>
    </label>

    <label>
      <span class="field-title">Repos <span class="info-tooltip" tabindex="0" aria-label="Optional newline-separated repository names or paths to include in this run.">i<span class="tooltip-content" role="tooltip">Optional newline-separated repository names or paths to include in this run.</span></span></span>
      <textarea name="repos" placeholder="service-a&#10;service-b">{{ settings.repos }}</textarea>
    </label>

    <label>
      <span class="field-title">Max diff lines <span class="info-tooltip" tabindex="0" aria-label="Maximum number of lines to include from each PR diff when bounded diffs are enabled.">i<span class="tooltip-content" role="tooltip">Maximum number of lines to include from each PR diff when bounded diffs are enabled.</span></span></span>
      <input type="number" name="max_diff_lines" value="500" min="1">
    </label>

    <label>
      <span class="field-title">Limit <span class="info-tooltip" tabindex="0" aria-label="Maximum number of results requested from each selected evidence source.">i<span class="tooltip-content" role="tooltip">Maximum number of results requested from each selected evidence source.</span></span></span>
      <input type="number" name="limit" value="10" min="1">
    </label>

    <fieldset>
      <legend>Sources</legend>
      <label><input type="checkbox" name="sources" value="confluence" checked> Confluence</label>
      <label><input type="checkbox" name="sources" value="jira" checked> Jira</label>
      <label><input type="checkbox" name="sources" value="azure"> Azure</label>
      <label><input type="checkbox" name="sources" value="dataverse"> Dataverse</label>
      <label><input type="checkbox" name="sources" value="code"> Code repositories</label>
    </fieldset>

    <fieldset>
      <legend>Options</legend>
      <input type="hidden" name="no_preset_expansion" value="0">
      <label><input type="checkbox" name="no_preset_expansion" value="1" checked> Skip preset expansion</label>
      <label><input type="checkbox" name="include_comments"> Include Jira comments</label>
      <label><input type="checkbox" name="refresh"> Refresh cache</label>
      <label><input type="checkbox" name="no_cache"> No cache</label>
      <label><input type="checkbox" name="include_prs"> Include PR metadata</label>
      <label><input type="checkbox" name="include_diffs"> Include bounded diffs</label>
      <label><input type="checkbox" name="github_fallback"> GitHub fallback</label>
    </fieldset>

    <div class="form-actions">
      <button type="button" hx-post="/discover-code-repos" hx-include="#evidence-form" hx-target="#code-repos" hx-swap="innerHTML">
        Discover repos
      </button>
      <button type="button" hx-post="/preview-command" hx-include="#evidence-form" hx-target="#command-preview" hx-swap="innerHTML">
        Preview command
      </button>
      <button class="primary-button" type="button" hx-post="/start-evidence-pack" hx-include="#evidence-form" hx-target="#run-result" hx-swap="innerHTML">
        Run evidence pack
      </button>
    </div>
  </form>

  <div id="command-preview" class="fragment-slot" aria-live="polite">
    {% include "partials/command_preview.html" %}
  </div>

  <div id="code-repos" class="fragment-slot" aria-live="polite"></div>

  <div id="run-result" class="fragment-slot" aria-live="polite"></div>

  <div class="notice">
    Running creates a timestamped folder under the configured Workbench evidence root and captures request metadata, command, logs and output.
  </div>
</section>
{% endblock %}
